model = "gpt-5.5"
model_reasoning_effort = "medium"

# ---- Notification hook (runs after every task) ----
approvals_reviewer = "guardian_subagent"

notify = ["/Users/tigery/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended", "--previous-notify", "[\"terminal-notifier\",\"-title\",\"Codex CLI\",\"-message\",\"Task complete!\",\"-sound\",\"default\",\"-group\",\"codex-tasks\"]"]
sandbox_mode = "workspace-write"

[features]
streamable_shell = true
view_image_tool = true
ghost_commit = true
unified_exec = true
shell_snapshot = true
collaboration_modes = true
terminal_resize_reflow = true
memories = true
network_proxy = true
mentions_v2 = true
prevent_idle_sleep = true
js_repl = false

[[skills.config]]
path = "skills/deslop"
enabled = true

[[skills.config]]
path = "skills/review-swarm"
enabled = true

[tui]
vim_mode_default = true
status_line = ["model-with-reasoning", "current-dir", "context-used", "git-branch"]
status_line_use_colors = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[desktop]
conversationDetailMode = "STEPS_COMMANDS"
ambient-suggestions-enabled = true
preventSleepWhileRunning = true
show-context-window-usage = true
